name: CI

# Runs on every push to main and every pull request targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer run on the same branch/PR cancels the older one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Python backend — lint, tests, coverage
  # ---------------------------------------------------------------------------
  python:
    name: Python · ruff + pytest + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system deps (Tesseract for OCR tests)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check app tests

      - name: Pytest with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Web dashboard (Next.js) — TypeScript check + production build
  # ---------------------------------------------------------------------------
  web:
    name: Web · typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js production build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Docker — validate the image builds (no push)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker · validate build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: kukku:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
