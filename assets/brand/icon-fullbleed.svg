<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kukku">
  <title>Kukku (full-bleed — Apple / maskable source)</title>
  <defs>
    <linearGradient id="fb" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7A6BFF"/>
      <stop offset="1" stop-color="#5B4DE0"/>
    </linearGradient>
  </defs>
  <!-- Full square fill (host OS applies its own corner mask) -->
  <rect width="512" height="512" fill="url(#fb)"/>
  <!-- K + dot, centred and scaled into the maskable safe zone -->
  <g transform="translate(256 256) scale(0.8) translate(-273 -262)">
    <g stroke="#FFFFFF" stroke-width="54" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M186 152 V372"/>
      <path d="M186 262 L358 372"/>
      <path d="M186 262 L316 186"/>
    </g>
    <circle cx="360" cy="152" r="26" fill="#FF9E64"/>
  </g>
</svg>
